<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Plan — Kavya's HQ</title>
<meta name="theme-color" content="#7C3AED">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kavya's HQ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  --violet:#7C3AED; --violet-light:#A855F7; --teal:#06D6A0;
  --amber:#F59E0B; --pink:#EC4899; --blue:#60a5fa;
  --white:#F0F4FF; --muted:#8892b0;
  --card:rgba(255,255,255,0.06); --cb:rgba(255,255,255,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(135deg,#1a1035 0%,#221645 30%,#1e2a4a 60%,#12203a 100%);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:100;background:rgba(26,16,53,0.92);border-bottom:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(16px);padding:0 28px;display:flex;align-items:center;height:56px;}
.nav-brand{font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:900;background:linear-gradient(135deg,#c084fc,#06D6A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:28px;white-space:nowrap;}
.nav-links{display:flex;gap:2px;flex:1;overflow-x:auto;}
.nav-link{padding:8px 14px;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap;text-decoration:none;display:flex;align-items:center;gap:6px;}
.nav-link:hover{background:rgba(255,255,255,0.06);color:var(--white);}
.nav-link.active{background:rgba(124,58,237,0.22);color:var(--violet-light);}

/* BG */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:drift 22s ease-in-out infinite;}
.orb1{width:700px;height:700px;background:rgba(124,58,237,0.2);top:-200px;left:-200px;}
.orb2{width:550px;height:550px;background:rgba(6,214,160,0.13);bottom:-150px;right:-100px;animation-delay:-8s;}
.orb3{width:400px;height:400px;background:rgba(96,165,250,0.1);top:40%;right:5%;animation-delay:-14s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(50px,-40px) scale(1.06);}66%{transform:translate(-35px,35px) scale(0.94);}}

/* LAYOUT */
.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:28px 20px 80px;}

/* PAGE HEADER */
.page-header{margin-bottom:28px;}
.page-header h1{font-family:'Orbitron',monospace;font-size:clamp(1.2rem,3vw,1.7rem);font-weight:900;background:linear-gradient(135deg,#c084fc,#06D6A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;}
.page-header p{font-size:0.78rem;color:var(--muted);}

/* SECTION TITLE */
.section-title{font-family:'Orbitron',monospace;font-size:0.66rem;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--cb);}

/* TASKS */
.tasks-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:28px;}
@media(max-width:660px){.tasks-grid{grid-template-columns:1fr;}}
.task-column{background:var(--card);border:1px solid var(--cb);border-radius:20px;padding:18px;backdrop-filter:blur(12px);}
.col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.col-title{font-size:0.82rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:8px;}
.col-count{font-family:'Orbitron',monospace;font-size:0.62rem;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:2px 9px;color:var(--muted);}

/* ADD TASK */
.add-row{display:flex;gap:8px;margin-bottom:14px;}
.task-input{flex:1;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px;padding:9px 14px;color:var(--white);font-size:0.8rem;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.2s;}
.task-input:focus{border-color:var(--violet);}
.task-input::placeholder{color:var(--muted);}
.add-btn{padding:9px 14px;border-radius:10px;border:none;background:rgba(124,58,237,0.3);color:var(--violet-light);font-size:0.85rem;cursor:pointer;transition:all 0.2s;}
.add-btn:hover{background:rgba(124,58,237,0.5);}

/* TASK ITEMS */
.task-list{display:flex;flex-direction:column;gap:6px;}
.task-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);transition:all 0.25s;cursor:pointer;group:true;}
.task-item:hover{background:rgba(255,255,255,0.06);}
.task-item.done{background:rgba(6,214,160,0.07);border-color:rgba(6,214,160,0.25);opacity:0.7;}
.task-check{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:0.72rem;flex-shrink:0;transition:all 0.22s;}
.task-item.done .task-check{background:var(--teal);border-color:var(--teal);box-shadow:0 0 8px rgba(6,214,160,0.4);}
.task-text{flex:1;font-size:0.82rem;color:var(--white);line-height:1.3;}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted);}
.task-del{opacity:0;width:22px;height:22px;border-radius:6px;border:none;background:rgba(236,72,153,0.18);color:var(--pink);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.task-item:hover .task-del{opacity:1;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:22px;color:var(--muted);font-size:0.78rem;opacity:0.6;}

/* NOTES */
.notes-card{background:var(--card);border:1px solid var(--cb);border-radius:20px;padding:20px;backdrop-filter:blur(12px);}
.notes-textarea{width:100%;min-height:180px;background:rgba(255,255,255,0.03);border:1.5px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;color:var(--white);font-size:0.83rem;font-family:'Inter',sans-serif;resize:vertical;outline:none;line-height:1.7;transition:border-color 0.2s;}
.notes-textarea:focus{border-color:rgba(124,58,237,0.5);}
.notes-textarea::placeholder{color:var(--muted);opacity:0.6;}
.notes-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.notes-chars{font-size:0.68rem;color:var(--muted);}
.notes-save-indicator{font-size:0.68rem;color:var(--teal);opacity:0;transition:opacity 0.3s;}
.notes-save-indicator.show{opacity:1;}

/* TOAST */
.toast{position:fixed;bottom:28px;right:22px;background:rgba(6,214,160,0.13);border:1px solid var(--teal);border-radius:12px;padding:11px 20px;font-size:0.8rem;color:var(--teal);font-weight:600;z-index:9998;transform:translateY(100px);opacity:0;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(12px);}
.toast.show{transform:translateY(0);opacity:1;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">KAVYA'S HQ</div>
  <div class="nav-links">
    <a class="nav-link" href="kavya-dashboard.html">🏠 Dashboard</a>
    <a class="nav-link" href="timer.html">⏱ Timer</a>
    <a class="nav-link active" href="weekly-plan.html">📅 Weekly Plan</a>
    <a class="nav-link" href="study-tracker.html">📚 Study Tracker</a>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-left:auto;padding-left:16px;flex-shrink:0;">
    <span id="syncStatus" style="font-size:0.68rem;font-family:'Orbitron',monospace;"></span>
    <button id="signOutBtn" onclick="doSignOut()" style="display:none;padding:5px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--muted);font-size:0.72rem;cursor:pointer;font-family:'Inter',sans-serif;">Sign Out</button>
  </div>
</nav>

<div class="bg-canvas">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
</div>

<div class="app">
  <div class="page-header">
    <h1>📅 WEEKLY PLAN</h1>
    <p id="weekLabel">This week's goals and tasks</p>
  </div>

  <!-- TASKS GRID -->
  <div class="section-title">TASKS BY CATEGORY</div>
  <div class="tasks-grid" id="tasksGrid"></div>

  <!-- BRAIN DUMP / NOTES -->
  <div class="section-title">BRAIN DUMP</div>
  <div class="notes-card">
    <textarea class="notes-textarea" id="notesArea" placeholder="Dump everything here — ideas, reminders, random thoughts, whatever's on your mind... 🧠"></textarea>
    <div class="notes-footer">
      <div class="notes-chars" id="notesChars">0 chars</div>
      <div class="notes-save-indicator" id="notesSaveInd">✓ Saved</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="authOverlay" style="position:fixed;inset:0;z-index:10000;background:rgba(26,16,53,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;backdrop-filter:blur(20px);">
  <div style="font-family:'Orbitron',monospace;font-size:clamp(1.3rem,3vw,2rem);font-weight:900;background:linear-gradient(135deg,#c084fc,#06D6A0,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">KAVYA'S HQ</div>
  <div style="font-size:0.88rem;color:rgba(240,244,255,0.6);max-width:320px;text-align:center;line-height:1.7;">Sign in to save your tasks and notes across devices.</div>
  <button onclick="signInGoogle()" style="display:flex;align-items:center;gap:12px;padding:15px 32px;background:white;border:none;border-radius:14px;cursor:pointer;font-size:0.92rem;font-weight:700;color:#1a1a2e;font-family:'Inter',sans-serif;box-shadow:0 4px 24px rgba(0,0,0,0.35);">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA5n_AsRjlR_IIaD9x75IjaH3bW-KDW2wE",
  authDomain: "kavya-hq.firebaseapp.com",
  projectId: "kavya-hq",
  storageBucket: "kavya-hq.firebasestorage.app",
  messagingSenderId: "757036313319",
  appId: "1:757036313319:web:5d5710622f059f49aa5042"
};
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();
const auth = firebase.auth();

const SK = 'kavya_weekly_v1';
let currentUser = null, unsubSnapshot = null, isRemoteUpdate = false;
let notesDebounce = null;

// ── STATE ──
const CATEGORIES = [
  { id:'mcat',    label:'🧬 MCAT',         color:'#7C3AED' },
  { id:'courses', label:'📖 Courses',       color:'#06D6A0' },
  { id:'apps',    label:'📋 Applications',  color:'#F59E0B' },
  { id:'health',  label:'💪 Health',        color:'#EC4899' },
  { id:'personal',label:'✨ Personal',      color:'#60a5fa' },
  { id:'other',   label:'🗂 Other',         color:'#a1a1aa' },
];

function defaultState() {
  return { tasks: {}, notes: '' };
}
// tasks: { categoryId: [ {id, text, done} ] }

function loadLocal() {
  const raw = localStorage.getItem(SK);
  return raw ? Object.assign(defaultState(), JSON.parse(raw)) : defaultState();
}
function saveLocal(s) { localStorage.setItem(SK, JSON.stringify(s)); }

let state = loadLocal();

function save(s) {
  saveLocal(s);
  if (currentUser) {
    db.collection('users').doc(currentUser.uid).collection('data').doc('weekly')
      .set(JSON.parse(JSON.stringify(s))).catch(console.error);
  }
}

// ── AUTH ──
function signInGoogle() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(()=>showToast('⚠️ Sign-in failed'));
}
function doSignOut() { if(confirm('Sign out?')) auth.signOut(); }
function showSyncStatus(s) {
  const el=document.getElementById('syncStatus'); if(!el) return;
  el.textContent=s==='synced'?'☁ Synced':s==='syncing'?'⟳ Syncing…':'';
  el.style.color=s==='synced'?'var(--teal)':'var(--amber)';
}

auth.onAuthStateChanged(async user => {
  if (user) {
    currentUser=user;
    document.getElementById('authOverlay').style.display='none';
    document.getElementById('signOutBtn').style.display='block';
    showSyncStatus('syncing');
    try {
      const snap=await db.collection('users').doc(user.uid).collection('data').doc('weekly').get();
      if(snap.exists){state=Object.assign(defaultState(),snap.data());saveLocal(state);}
      else{save(state);}
    } catch(e){console.error(e);}
    showSyncStatus('synced');
    subscribeUpdates();
    renderAll();
  } else {
    currentUser=null;
    if(unsubSnapshot){unsubSnapshot();unsubSnapshot=null;}
    document.getElementById('authOverlay').style.display='flex';
    document.getElementById('signOutBtn').style.display='none';
    state=loadLocal(); renderAll();
  }
});

function subscribeUpdates() {
  if(unsubSnapshot) unsubSnapshot();
  unsubSnapshot=db.collection('users').doc(currentUser.uid).collection('data').doc('weekly')
    .onSnapshot(snap=>{
      if(!snap.exists||snap.metadata.hasPendingWrites) return;
      isRemoteUpdate=true;
      state=Object.assign(defaultState(),snap.data());
      saveLocal(state); renderAll();
      isRemoteUpdate=false;
      showSyncStatus('synced');
    });
}

// ── TASKS ──
function getWeekLabel() {
  const now=new Date();
  const opts={timeZone:'America/New_York',month:'short',day:'numeric'};
  const day=now.getDay(), diff=(day===0)?-6:1-day;
  const mon=new Date(now);mon.setDate(now.getDate()+diff);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  return `Week of ${mon.toLocaleDateString('en-US',opts)} – ${sun.toLocaleDateString('en-US',opts)}`;
}

function addTask(catId) {
  const inp=document.getElementById('inp-'+catId);
  const text=inp.value.trim(); if(!text) return;
  if(!state.tasks[catId]) state.tasks[catId]=[];
  state.tasks[catId].push({id:Date.now()+'',text,done:false});
  inp.value=''; save(state); renderCategory(catId);
}

function toggleTask(catId, taskId) {
  const list=state.tasks[catId]||[];
  const t=list.find(t=>t.id===taskId); if(!t) return;
  t.done=!t.done; save(state); renderCategory(catId);
}

function deleteTask(catId, taskId) {
  state.tasks[catId]=(state.tasks[catId]||[]).filter(t=>t.id!==taskId);
  save(state); renderCategory(catId);
}

function renderCategory(catId) {
  const el=document.getElementById('tasks-'+catId); if(!el) return;
  const list=state.tasks[catId]||[];
  const sorted=[...list.filter(t=>!t.done),...list.filter(t=>t.done)];
  const cat=CATEGORIES.find(c=>c.id===catId);
  const countEl=document.getElementById('count-'+catId);
  const done=list.filter(t=>t.done).length;
  if(countEl) countEl.textContent=`${done}/${list.length}`;
  if(!sorted.length){el.innerHTML='<div class="empty-state">No tasks yet<br><span style="font-size:1.2rem">✨</span></div>';return;}
  el.innerHTML=sorted.map(t=>`
    <div class="task-item${t.done?' done':''}" onclick="toggleTask('${catId}','${t.id}')">
      <div class="task-check" style="${t.done?'':'border-color:'+cat.color+'44'}">${t.done?'✓':''}</div>
      <div class="task-text">${escHtml(t.text)}</div>
      <button class="task-del" onclick="event.stopPropagation();deleteTask('${catId}','${t.id}')">×</button>
    </div>`).join('');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildGrid() {
  const grid=document.getElementById('tasksGrid'); grid.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const col=document.createElement('div'); col.className='task-column';
    col.innerHTML=`
      <div class="col-header">
        <div class="col-title"><span>${cat.label}</span></div>
        <div class="col-count" id="count-${cat.id}">0/0</div>
      </div>
      <div class="add-row">
        <input class="task-input" id="inp-${cat.id}" placeholder="Add task…" onkeydown="if(event.key==='Enter')addTask('${cat.id}')">
        <button class="add-btn" onclick="addTask('${cat.id}')">+</button>
      </div>
      <div class="task-list" id="tasks-${cat.id}"></div>`;
    grid.appendChild(col);
    renderCategory(cat.id);
  });
}

// ── NOTES ──
function renderNotes() {
  const ta=document.getElementById('notesArea'); if(!ta) return;
  if(!isRemoteUpdate) {} // don't overwrite if user is typing (handled by remote flag)
  ta.value=state.notes||'';
  document.getElementById('notesChars').textContent=`${(state.notes||'').length} chars`;
}

function initNotes() {
  const ta=document.getElementById('notesArea');
  ta.addEventListener('input',()=>{
    state.notes=ta.value;
    saveLocal(state);
    document.getElementById('notesChars').textContent=`${ta.value.length} chars`;
    clearTimeout(notesDebounce);
    notesDebounce=setTimeout(()=>{
      if(currentUser){
        db.collection('users').doc(currentUser.uid).collection('data').doc('weekly')
          .set(JSON.parse(JSON.stringify(state))).then(()=>{
            const ind=document.getElementById('notesSaveInd');
            ind.classList.add('show'); setTimeout(()=>ind.classList.remove('show'),1800);
          }).catch(console.error);
      }
    },1200);
  });
}

// ── RENDER ──
function renderAll() {
  buildGrid(); renderNotes();
}

// ── TOAST ──
let toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2800);}

// ── INIT ──
document.getElementById('weekLabel').textContent=getWeekLabel();
buildGrid();
initNotes();
</script>
</body>
