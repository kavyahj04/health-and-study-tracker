<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer — Kavya's HQ</title>
<meta name="theme-color" content="#7C3AED">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kavya's HQ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  --violet:#7C3AED; --violet-light:#A855F7; --teal:#06D6A0;
  --amber:#F59E0B; --pink:#EC4899; --blue:#60a5fa;
  --white:#F0F4FF; --muted:#8892b0;
  --card:rgba(255,255,255,0.06); --cb:rgba(255,255,255,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(135deg,#1a1035 0%,#221645 30%,#1e2a4a 60%,#12203a 100%);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}

/* NAVBAR */
.navbar{position:sticky;top:0;z-index:100;background:rgba(26,16,53,0.92);border-bottom:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(16px);padding:0 28px;display:flex;align-items:center;height:56px;}
.nav-brand{font-family:'Orbitron',monospace;font-size:0.85rem;font-weight:900;background:linear-gradient(135deg,#c084fc,#06D6A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-right:28px;white-space:nowrap;}
.nav-links{display:flex;gap:2px;flex:1;overflow-x:auto;}
.nav-link{padding:8px 14px;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap;text-decoration:none;display:flex;align-items:center;gap:6px;}
.nav-link:hover{background:rgba(255,255,255,0.06);color:var(--white);}
.nav-link.active{background:rgba(124,58,237,0.22);color:var(--violet-light);}

/* BG */
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:drift 22s ease-in-out infinite;}
.orb1{width:700px;height:700px;background:rgba(124,58,237,0.22);top:-200px;left:-200px;}
.orb2{width:550px;height:550px;background:rgba(6,214,160,0.15);bottom:-150px;right:-100px;animation-delay:-8s;}
.orb3{width:350px;height:350px;background:rgba(236,72,153,0.1);top:30%;right:10%;animation-delay:-14s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(50px,-40px) scale(1.06);}66%{transform:translate(-35px,35px) scale(0.94);}}

/* LAYOUT */
.app{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:20px 20px 80px;display:flex;flex-direction:column;align-items:center;}

/* BIG TIMER RING */
.timer-hero{display:flex;justify-content:center;align-items:center;padding:32px 0 28px;width:100%;}
.ring-wrap{position:relative;width:min(320px, 80vw);height:min(320px, 80vw);}
.timer-svg{width:100%;height:100%;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:16;}
.ring-progress{fill:none;stroke:url(#timerGrad);stroke-width:16;stroke-linecap:round;stroke-dasharray:942;stroke-dashoffset:0;transition:stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1);filter:drop-shadow(0 0 10px rgba(124,58,237,0.7));}
.ring-progress.running{animation:ring-glow 2s ease-in-out infinite;}
@keyframes ring-glow{0%,100%{filter:drop-shadow(0 0 10px rgba(124,58,237,0.6));}50%{filter:drop-shadow(0 0 24px rgba(6,214,160,0.9));}}

/* CENTER TEXT */
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.time-big{font-family:'Orbitron',monospace;font-size:clamp(2.8rem,12vw,4.4rem);font-weight:900;letter-spacing:0.04em;background:linear-gradient(135deg,#c084fc,#06D6A0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;}
.time-label{font-family:'Orbitron',monospace;font-size:0.7rem;letter-spacing:0.25em;color:var(--muted);}

/* MODE BUTTONS */
.mode-row{display:flex;gap:10px;margin-bottom:20px;}
.mode-btn{padding:12px 28px;border-radius:30px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--muted);font-family:'Orbitron',monospace;font-size:0.82rem;font-weight:700;cursor:pointer;letter-spacing:0.06em;transition:all 0.25s;}
.mode-btn.active{border-color:var(--violet);background:rgba(124,58,237,0.25);color:var(--violet-light);box-shadow:0 0 20px rgba(124,58,237,0.3);}
.mode-btn:hover:not(.active){border-color:rgba(255,255,255,0.22);color:var(--white);}

/* ACTION BUTTONS */
.action-row{display:flex;gap:12px;margin-bottom:28px;width:100%;max-width:340px;}
.start-btn{flex:1;padding:17px 20px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--violet),var(--violet-light));color:#fff;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Orbitron',monospace;letter-spacing:0.08em;transition:all 0.25s;box-shadow:0 4px 24px rgba(124,58,237,0.4);}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(124,58,237,0.55);}
.start-btn.paused{background:linear-gradient(135deg,var(--amber),#f97316);box-shadow:0 4px 24px rgba(245,158,11,0.4);}
.reset-btn{padding:17px 18px;border-radius:16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);color:var(--muted);font-size:1.1rem;cursor:pointer;transition:all 0.25s;}
.reset-btn:hover{background:rgba(255,255,255,0.1);color:var(--white);}

/* BREAK ALERT */
.break-alert{display:none;align-items:center;gap:10px;background:rgba(6,214,160,0.13);border:1px solid rgba(6,214,160,0.4);border-radius:14px;padding:14px 18px;margin-bottom:20px;width:100%;max-width:400px;animation:glow-pulse 1.5s ease infinite;}
.break-alert.show{display:flex;}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 8px rgba(6,214,160,0.3);}50%{box-shadow:0 0 22px rgba(6,214,160,0.6);}}
.break-text{flex:1;font-size:0.85rem;color:var(--teal);font-weight:600;}
.break-dismiss{background:rgba(6,214,160,0.2);border:1px solid rgba(6,214,160,0.4);border-radius:8px;padding:5px 14px;color:var(--teal);font-size:0.72rem;cursor:pointer;font-family:'Inter',sans-serif;}

/* SESSION INFO */
.session-card{background:var(--card);border:1px solid var(--cb);border-radius:20px;padding:20px;width:100%;max-width:400px;}
.session-label{font-family:'Orbitron',monospace;font-size:0.65rem;letter-spacing:0.2em;color:var(--muted);margin-bottom:10px;}
.session-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;min-height:28px;}
.chip{padding:4px 12px;border-radius:20px;font-size:0.7rem;font-weight:700;font-family:'Orbitron',monospace;}
.chip-50{background:rgba(124,58,237,0.25);color:var(--violet-light);border:1px solid rgba(124,58,237,0.4);}
.chip-30{background:rgba(6,214,160,0.18);color:var(--teal);border:1px solid rgba(6,214,160,0.4);}
.chip-partial{background:rgba(245,158,11,0.18);color:var(--amber);border:1px solid rgba(245,158,11,0.35);}
.total-row{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);}
.total-label{font-size:0.75rem;color:var(--muted);}
.total-val{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:var(--teal);}

/* TOAST */
.toast{position:fixed;bottom:28px;right:22px;background:rgba(6,214,160,0.13);border:1px solid var(--teal);border-radius:12px;padding:11px 20px;font-size:0.8rem;color:var(--teal);font-weight:600;z-index:9998;transform:translateY(100px);opacity:0;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);backdrop-filter:blur(12px);}
.toast.show{transform:translateY(0);opacity:1;}
.confetti-piece{position:fixed;border-radius:2px;pointer-events:none;z-index:9999;animation:cfall 1.3s ease forwards;}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0deg);opacity:1;}100%{transform:translateY(85vh) rotate(400deg);opacity:0;}}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">KAVYA'S HQ</div>
  <div class="nav-links">
    <a class="nav-link" href="kavya-dashboard.html">🏠 Dashboard</a>
    <a class="nav-link active" href="timer.html">⏱ Timer</a>
    <a class="nav-link" href="weekly-plan.html">📅 Weekly Plan</a>
    <a class="nav-link" href="study-tracker.html">📚 Study Tracker</a>
  </div>
  <div style="display:flex;align-items:center;gap:10px;margin-left:auto;padding-left:16px;flex-shrink:0;">
    <span id="syncStatus" style="font-size:0.68rem;font-family:'Orbitron',monospace;"></span>
    <button id="signOutBtn" onclick="doSignOut()" style="display:none;padding:5px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:var(--muted);font-size:0.72rem;cursor:pointer;font-family:'Inter',sans-serif;">Sign Out</button>
  </div>
</nav>

<div class="bg-canvas">
  <div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
</div>

<div class="app">

  <!-- BIG RING TIMER -->
  <div class="timer-hero">
    <div class="ring-wrap">
      <svg class="timer-svg" viewBox="0 0 340 340">
        <defs>
          <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7C3AED"/>
            <stop offset="50%" stop-color="#06D6A0"/>
            <stop offset="100%" stop-color="#EC4899"/>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="170" cy="170" r="150"/>
        <circle class="ring-progress" id="timerRing" cx="170" cy="170" r="150"/>
      </svg>
      <div class="ring-inner">
        <div class="time-big" id="timerDisplay">50:00</div>
        <div class="time-label" id="timerLabel">FOCUS</div>
      </div>
    </div>
  </div>

  <!-- MODE BUTTONS -->
  <div class="mode-row">
    <button class="mode-btn active" id="btn50" onclick="setMode(50)">50 MIN</button>
    <button class="mode-btn" id="btn30" onclick="setMode(30)">30 MIN</button>
  </div>

  <!-- ACTION BUTTONS -->
  <div class="action-row">
    <button class="start-btn" id="startBtn" onclick="startPause()">▶ START</button>
    <button class="reset-btn" onclick="resetTimer()">↺</button>
  </div>

  <!-- BREAK ALERT -->
  <div class="break-alert" id="breakAlert">
    <span style="font-size:1.3rem">☕</span>
    <div class="break-text" id="breakText">Take a break!</div>
    <button class="break-dismiss" onclick="dismissBreak()">Got it ✓</button>
  </div>

  <!-- SESSION LOG -->
  <div class="session-card">
    <div class="session-label">SESSION LOG</div>
    <div class="session-chips" id="sessionChips">
      <span style="font-size:0.72rem;color:var(--muted)">No sessions yet</span>
    </div>
    <div class="total-row">
      <div class="total-label">Total focused today</div>
      <div class="total-val" id="totalDisplay">0h 0m</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<div id="authOverlay" style="position:fixed;inset:0;z-index:10000;background:rgba(26,16,53,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;backdrop-filter:blur(20px);">
  <div style="font-family:'Orbitron',monospace;font-size:clamp(1.3rem,3vw,2rem);font-weight:900;background:linear-gradient(135deg,#c084fc,#06D6A0,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">KAVYA'S HQ</div>
  <div style="font-size:0.88rem;color:rgba(240,244,255,0.6);max-width:320px;text-align:center;line-height:1.7;">Sign in to sync your timer sessions across devices.</div>
  <button onclick="signInGoogle()" style="display:flex;align-items:center;gap:12px;padding:15px 32px;background:white;border:none;border-radius:14px;cursor:pointer;font-size:0.92rem;font-weight:700;color:#1a1a2e;font-family:'Inter',sans-serif;box-shadow:0 4px 24px rgba(0,0,0,0.35);">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyA5n_AsRjlR_IIaD9x75IjaH3bW-KDW2wE",
  authDomain: "kavya-hq.firebaseapp.com",
  projectId: "kavya-hq",
  storageBucket: "kavya-hq.firebasestorage.app",
  messagingSenderId: "757036313319",
  appId: "1:757036313319:web:5d5710622f059f49aa5042"
};
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore();
const auth = firebase.auth();

// ── TIMER STATE (in-memory) ──
let timerMode = 50;
let secsTotal = 50 * 60;
let secsLeft  = 50 * 60;
let running   = false;
let interval  = null;
let accumSecs = 0;         // secs in current run (across pauses)

// ── RING CIRCUMFERENCE ──
const CIRC = 942; // 2π × 150

// ── DB STATE (read from Firestore) ──
let currentUser = null, unsubSnapshot = null;
let timerSessions = [], timerTotalMins = 0;

function todayStringEST() {
  return new Date().toLocaleDateString('en-US',{timeZone:'America/New_York',year:'numeric',month:'2-digit',day:'2-digit'});
}

function showSyncStatus(s) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.textContent = s==='synced'?'☁ Synced':s==='syncing'?'⟳ Syncing…':'';
  el.style.color = s==='synced'?'var(--teal)':'var(--amber)';
}

function signInGoogle() {
  auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(()=>showToast('⚠️ Sign-in failed'));
}
function doSignOut() { if(confirm('Sign out?')) auth.signOut(); }

auth.onAuthStateChanged(async user => {
  if (user) {
    currentUser = user;
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('signOutBtn').style.display = 'block';
    showSyncStatus('syncing');
    await loadFromDb();
    showSyncStatus('synced');
    subscribeUpdates();
    renderChips(); renderTotal();
  } else {
    currentUser = null;
    if (unsubSnapshot) { unsubSnapshot(); unsubSnapshot=null; }
    document.getElementById('authOverlay').style.display = 'flex';
    document.getElementById('signOutBtn').style.display = 'none';
  }
});

async function loadFromDb() {
  try {
    const snap = await db.collection('users').doc(currentUser.uid).collection('data').doc('dashboard').get();
    if (snap.exists) {
      const d = snap.data();
      // Reset sessions if it's a new day
      const lastDate = d.lastDate || todayStringEST();
      if (lastDate !== todayStringEST()) {
        timerSessions = []; timerTotalMins = 0;
      } else {
        timerSessions = d.timerSessions || [];
        timerTotalMins = d.timerTotalMins || 0;
      }
    }
  } catch(e) { console.error(e); }
}

function subscribeUpdates() {
  if (unsubSnapshot) unsubSnapshot();
  unsubSnapshot = db.collection('users').doc(currentUser.uid).collection('data').doc('dashboard')
    .onSnapshot(snap => {
      if (!snap.exists || snap.metadata.hasPendingWrites) return;
      const d = snap.data();
      if (!d) return;
      // Only update sessions from remote if not running locally
      if (!running) {
        timerSessions = d.timerSessions || [];
        timerTotalMins = d.timerTotalMins || 0;
        renderChips(); renderTotal();
      }
    });
}

function saveToDb() {
  if (!currentUser) return;
  // Merge-update only timer fields in the dashboard document
  db.collection('users').doc(currentUser.uid).collection('data').doc('dashboard')
    .set({ timerSessions, timerTotalMins }, { merge: true })
    .catch(console.error);
}

// ── TIMER LOGIC ──
function setMode(m) {
  if (running) return;
  timerMode = m; secsTotal = m*60; secsLeft = m*60; accumSecs = 0;
  document.getElementById('btn50').classList.toggle('active', m===50);
  document.getElementById('btn30').classList.toggle('active', m===30);
  document.getElementById('timerLabel').textContent = 'FOCUS';
  updateRing(); renderDisplay();
}

function startPause() {
  if (!running) {
    running = true;
    document.getElementById('startBtn').textContent = '⏸ PAUSE';
    document.getElementById('startBtn').classList.add('paused');
    document.getElementById('timerRing').classList.add('running');
    document.getElementById('timerLabel').textContent = 'FOCUSING';
    interval = setInterval(() => {
      secsLeft--; accumSecs++;
      renderDisplay(); updateRing();
      if (secsLeft <= 0) { clearInterval(interval); running=false; onComplete(); }
    }, 1000);
  } else {
    clearInterval(interval); running=false;
    document.getElementById('startBtn').textContent = '▶ RESUME';
    document.getElementById('startBtn').classList.remove('paused');
    document.getElementById('timerRing').classList.remove('running');
    document.getElementById('timerLabel').textContent = 'PAUSED';
  }
}

function resetTimer() {
  if (running) { clearInterval(interval); running=false; }
  if (accumSecs >= 60) {
    const mins = Math.floor(accumSecs/60);
    timerSessions.push({ type:'partial', mins });
    timerTotalMins += mins;
    saveToDb(); renderChips(); renderTotal();
  }
  secsLeft=secsTotal; accumSecs=0;
  document.getElementById('startBtn').textContent='▶ START';
  document.getElementById('startBtn').classList.remove('paused');
  document.getElementById('timerRing').classList.remove('running');
  document.getElementById('timerLabel').textContent='FOCUS';
  updateRing(); renderDisplay();
}

function onComplete() {
  timerSessions.push({ type: String(timerMode), mins: timerMode });
  timerTotalMins += timerMode;
  saveToDb();
  accumSecs=0; secsLeft=secsTotal;
  document.getElementById('startBtn').textContent='▶ START';
  document.getElementById('startBtn').classList.remove('paused');
  document.getElementById('timerRing').classList.remove('running');
  document.getElementById('timerLabel').textContent='DONE!';
  updateRing(); renderDisplay(); renderChips(); renderTotal();
  const info = calcBreak();
  showBreakAlert(info);
  speak(info.speech);
  confetti();
}

function calcBreak() {
  const lastType = String(timerMode);
  let consecutive = 0;
  for (let i = timerSessions.length-1; i>=0; i--) {
    if (timerSessions[i].type===lastType) consecutive++; else break;
  }
  if (timerTotalMins>0 && timerTotalMins%165===0) return {break:20,speech:`Amazing Kavya! ${Math.floor(timerTotalMins/60)} hours done. Take a 20 minute break, you earned it!`};
  if (lastType==='50') {
    if (consecutive%3===0) return {break:20,speech:`50 minutes done Kavya, take a 20 minute break! ${consecutive} sessions in a row!`};
    return {break:10,speech:`50 minutes done Kavya, take a 10 minute break! Keep crushing it!`};
  }
  if (lastType==='30') {
    if (consecutive>=6&&consecutive%6===0) return {break:30,speech:`Wow Kavya! ${consecutive} sessions done. Take a 30 minute break!`};
    return {break:4,speech:`30 minutes done Kavya, take a 4 minute break! Stay in the zone!`};
  }
  return {break:5,speech:`Session complete Kavya! Take a short break.`};
}

function showBreakAlert(info) {
  document.getElementById('breakText').textContent=`☕ Take a ${info.break} min break — session complete!`;
  document.getElementById('breakAlert').classList.add('show');
}
function dismissBreak() { document.getElementById('breakAlert').classList.remove('show'); }

function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate=0.92; utt.pitch=1.05; utt.volume=1;
  const voices=window.speechSynthesis.getVoices();
  const v=voices.find(v=>v.name.includes('Samantha')||v.name.includes('Google US English')||v.lang==='en-US');
  if(v) utt.voice=v;
  window.speechSynthesis.speak(utt);
}
if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();

// ── RENDER ──
function renderDisplay() {
  const m=Math.floor(secsLeft/60).toString().padStart(2,'0');
  const s=(secsLeft%60).toString().padStart(2,'0');
  document.getElementById('timerDisplay').textContent=`${m}:${s}`;
}

function updateRing() {
  const offset = CIRC * (secsLeft / secsTotal);
  document.getElementById('timerRing').style.strokeDashoffset = offset;
}

function renderChips() {
  const el = document.getElementById('sessionChips');
  if (!timerSessions.length) { el.innerHTML='<span style="font-size:0.72rem;color:var(--muted)">No sessions yet</span>'; return; }
  el.innerHTML = timerSessions.map(s => {
    if (s.type==='partial') return `<span class="chip chip-partial">~${s.mins}m</span>`;
    if (s.type==='50') return `<span class="chip chip-50">50m</span>`;
    return `<span class="chip chip-30">30m</span>`;
  }).join('');
}

function renderTotal() {
  const total = timerTotalMins + (running ? Math.floor(accumSecs/60) : 0);
  const h=Math.floor(total/60), m=total%60;
  document.getElementById('totalDisplay').textContent=`${h}h ${m}m`;
}

// ── CONFETTI ──
const CC=['#7C3AED','#06D6A0','#EC4899','#F59E0B','#60a5fa'];
function confetti(){for(let i=0;i<22;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.cssText=`left:${15+Math.random()*70}vw;top:20vh;background:${CC[i%5]};width:${5+Math.random()*8}px;height:${5+Math.random()*8}px;animation-delay:${Math.random()*0.4}s;animation-duration:${1+Math.random()*0.9}s;`;document.body.appendChild(p);setTimeout(()=>p.remove(),2100);}}

// ── TOAST ──
let toastT;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2800);}

// Init ring to full
updateRing();
</script>
